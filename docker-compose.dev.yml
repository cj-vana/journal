# Development compose — for developers who clone the repo.
# Usage: docker compose -f docker-compose.dev.yml up --build
services:
  journal:
    build: .
    container_name: baby-journal-dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - journal-data:/data
    environment:
      - DATABASE_URL=file:/data/db/journal.db
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_URL=http://localhost:3000
      - NEXTAUTH_URL=http://localhost:3000
      - UPLOAD_DIR=/data/uploads
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ENABLE_DEBUG_PROFILE=${ENABLE_DEBUG_PROFILE:-false}
      - DEBUG_KEY=${DEBUG_KEY}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/api/auth/session"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  journal-data:
    driver: local
