name: Release

on:
  push:
    tags: ["v*.*.*"]

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/cj-vana/journal
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Build smoke-test image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          platforms: linux/amd64
          tags: journal-smoke:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test container
        run: |
          docker run -d --name journal-smoke \
            -e DATABASE_URL=file:/data/db/journal.db \
            -e AUTH_SECRET=release-smoke-secret-minimum-32-characters \
            -e AUTH_URL=http://localhost:3000 \
            -e NEXTAUTH_URL=http://localhost:3000 \
            -p 3000:3000 \
            journal-smoke:${{ github.sha }}
          for i in $(seq 1 30); do
            if wget -q -O /dev/null http://localhost:3000/api/auth/session; then
              exit 0
            fi
            sleep 2
          done
          docker logs journal-smoke
          exit 1

      - name: Clean up smoke test
        if: always()
        run: docker rm -f journal-smoke || true

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]' | sed -n '2p')
          if [ -n "$PREV_TAG" ]; then
            LOG=$(git log --pretty=format:"- %s (%h)" "$PREV_TAG"..HEAD)
          else
            LOG=$(git log --pretty=format:"- %s (%h)")
          fi
          {
            echo "changelog<<EOF"
            echo "$LOG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          body: |
            ## Docker

            ```bash
            docker pull ghcr.io/cj-vana/journal:${{ github.ref_name }}
            ```

            ## Changes

            ${{ steps.changelog.outputs.changelog }}
